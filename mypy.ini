[mypy]
python_version = 3.10
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
disable_error_code = untyped-decorator

# Numba has no stubs and its decorators erase type information.
[mypy-numba]
ignore_missing_imports = True
[mypy-numba.*]
ignore_missing_imports = True

# tqdm has no stubs.
[mypy-tqdm]
ignore_missing_imports = True
[mypy-tqdm.*]
ignore_missing_imports = True

# scipy has partial stubs that are flaky on this version.
[mypy-scipy.*]
ignore_missing_imports = True

# matplotlib has no built-in stubs.
[mypy-matplotlib.*]
ignore_missing_imports = True

# Test and helper modules: relaxed (no return-type annotations
# on test methods, no per-function strict).
[mypy-flock_simulator.tests.*]
disallow_untyped_defs = False
disallow_untyped_decorators = False
check_untyped_defs = False

[mypy-flock_simulator.scripts.*]
disallow_untyped_defs = False
disallow_untyped_decorators = False
disallow_untyped_calls = False
check_untyped_defs = False
warn_return_any = False

# The legacy with-cone simulator at version4/src is not part of
# the package and is not typed.
[mypy-vicsek_double_adaptive]
ignore_missing_imports = True
